<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>
	<h2>Example of Hidden Form Field</h2>
	<form action="InfoServlet">
		<input
			type="text"
			placeholder="Enter username"
			name="username"
			id="username"
		> <br>
		<input
			type="email"
			placeholder="Enter email"
			name="email"
			id="email"
		> <br>
		<input
			type="password"
			placeholder="Enter password"
			name="password"
			id="password"
		> <br>
		<input
			type="submit"
			name="Submit"
		>
		<input
			type="reset"
			name="Reset"
		> <br>
		
	</form>
</body>
</html>
