<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>
	<h3>Examples of JSP Implicit Objects</h3>
	<form action="example1.jsp" method="post">
		<input
			type="email"
			placeholder="Enter Email"
			id="email"
			name="email"
			required
		> <br>
		<input
			type="password"
			placeholder="Enter Password"
			id="password"
			name="password"
			required
		> <br>
		<input
			type="submit"
			value="Login"
		>
		<input
			type="reset"
			value="Reset"
		> <br>
	</form>
</body>
</html>
